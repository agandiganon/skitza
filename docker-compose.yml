services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skitza-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: "*"
      DATA_DIR: /var/lib/skitza-data
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 40
    volumes:
      - backend_data:/var/lib/skitza-data
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        BACKEND_ORIGIN: http://backend:4000
    container_name: skitza-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      BACKEND_ORIGIN: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  backend_data:
